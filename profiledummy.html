<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />

			name="viewport"

	<body>
		<div class="container">
			<!-- TOP SECTION -->
			<div class="top-section">

				<div class="center">

						<img
							src="assets/Settings.png"

						/>

						<input
							type="text"

						/>
					</div>

					<div class="input-group">
						<label>Email</label>
						<input
							type="email"
							value="choi_yena@gmail.com"
							readonly
						/>
					</div>

					<div class="input-group">
						<label>Phone</label>
						<input
							type="text"
							value="0547-5495-0504"
							readonly
						/>
					</div>
				</div>
