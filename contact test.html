  <style>
.container {
	display: grid;
	grid-template-columns: repeat(5, auto);
	grid-template-areas:
	'logo logo logo logo logo'
	'left left left right right'

/*bagian header*/
	
.header {
  background-color: #FFFFFF;
  text-align: center;
  padding-bottom: 30px;
  padding-top: 5px;
  font-size: 18px;
}

.topbar {
  display: flex;
  align-items: center;
  padding: 10px 30px;
}

.left,

}

}

.divider {

  height: 14px;
  background-color: #000066;
}

/*ini buat logo*/
.center {

  justify-content: center;
}

.center img {

}

/* item kanan */
.right {
  display: flex;
  justify-content: flex-end;
  gap: 20px;
}

right img {
  width: 20px;
}
